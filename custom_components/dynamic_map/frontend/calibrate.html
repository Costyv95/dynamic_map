<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Calibration Tool</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .container { display: flex; gap: 20px; height: 80vh; }
        .panel { flex: 1; display: flex; flex-direction: column; align-items: center; background: #2a2a2a; border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .toolbar { margin-bottom: 10px; display: flex; gap: 10px; }
        button { background: #1580DD; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1a90ff; }
        .canvas-wrapper { flex: 1; width: 100%; position: relative; overflow: auto; display: flex; justify-content: center; align-items: center; background: #000; border: 2px solid #444; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; cursor: crosshair; }
        .instructions { background: #333; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .matrix-output { font-family: monospace; background: #000; padding: 10px; border-radius: 4px; color: #0f0; margin-top: 10px; white-space: pre-wrap; }
        .point-list { display: flex; gap: 20px; margin-top: 10px; }
        .pt-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
        #clearBtn { background: #dc3545; }
        #clearBtn:hover { background: #c82333; }
        #saveBtn { background: #28a745; display: none; }
        #saveBtn:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Roborock Map Calibration</h1>
        <p>Match 3 identical corners to compute the Affine Transformation Matrix.</p>
    </div>

    <div class="container">
        <!-- ROBOROCK PANEL -->
        <div class="panel">
            <h3>Roborock Source (roborock.jpg)</h3>
            <div class="toolbar">
                <button onclick="rotateRoborock(-90)">↺ Rotate -90°</button>
                <button onclick="rotateRoborock(90)">Rotate +90° ↻</button>
                <button onclick="flipRoborock('H')">Flip H</button>
                <button onclick="flipRoborock('V')">Flip V</button>
            </div>
            <div class="canvas-wrapper">
                <canvas id="canvasLeft"></canvas>
            </div>
            <div class="point-list" id="listLeft"></div>
        </div>

        <!-- SVG PANEL -->
        <div class="panel">
            <h3>Floorplan Target (bg_floor2.png)</h3>
            <div class="toolbar">
                <button id="clearBtn" onclick="clearPoints()">Clear Points</button>
                <button id="saveBtn" onclick="saveCalibration()">Save Calibration</button>
            </div>
            <div class="canvas-wrapper">
                <canvas id="canvasRight"></canvas>
            </div>
            <div class="point-list" id="listRight"></div>
        </div>
    </div>

    <div class="instructions">
        <h3>Matrix Math Result:</h3>
        <div class="matrix-output" id="output">Waiting for 3 matching points...</div>
    </div>

    <script>
        const canvasLeft = document.getElementById('canvasLeft');
        const ctxLeft = canvasLeft.getContext('2d');
        const canvasRight = document.getElementById('canvasRight');
        const ctxRight = canvasRight.getContext('2d');
        
        let roboImg = new Image();
        let svgImg = new Image();
        
        // Transform state for Roborock map
        let roboTransform = { angle: 0, flipH: 1, flipV: 1 };
        
        // Points
        let pointsLeft = [];
        let pointsRight = [];
        const ptColors = ['#ff0000', '#00ff00', '#00bbff'];

        // Load Images
        roboImg.src = 'roborock.jpg';
        roboImg.onload = drawLeft;
        
        svgImg.src = 'bg_floor2.png';
        svgImg.onload = () => {
            canvasRight.width = svgImg.width;
            canvasRight.height = svgImg.height;
            drawRight();
        };

        // --- Roborock Transform Controls ---
        function rotateRoborock(deg) {
            roboTransform.angle = (roboTransform.angle + deg) % 360;
            drawLeft();
            recalculateMatrix(); // Recalculate if points were already placed
        }

        function flipRoborock(axis) {
            if(axis === 'H') roboTransform.flipH *= -1;
            if(axis === 'V') roboTransform.flipV *= -1;
            drawLeft();
            recalculateMatrix();
        }

        function drawLeft() {
            if(!roboImg.complete) return;
            
            // Calculate transformed dimensions
            let isRotated = Math.abs(roboTransform.angle) === 90 || Math.abs(roboTransform.angle) === 270;
            canvasLeft.width = isRotated ? roboImg.height : roboImg.width;
            canvasLeft.height = isRotated ? roboImg.width : roboImg.height;
            
            ctxLeft.clearRect(0, 0, canvasLeft.width, canvasLeft.height);
            ctxLeft.save();
            
            // Translate to center
            ctxLeft.translate(canvasLeft.width/2, canvasLeft.height/2);
            ctxLeft.rotate((roboTransform.angle * Math.PI) / 180);
            ctxLeft.scale(roboTransform.flipH, roboTransform.flipV);
            
            // Draw image centered
            ctxLeft.drawImage(roboImg, -roboImg.width/2, -roboImg.height/2);
            ctxLeft.restore();
            
            drawPoints(ctxLeft, pointsLeft);
        }

        function drawRight() {
            if(!svgImg.complete) return;
            ctxRight.clearRect(0, 0, canvasRight.width, canvasRight.height);
            ctxRight.drawImage(svgImg, 0, 0);
            drawPoints(ctxRight, pointsRight);
        }

        function drawPoints(ctx, points) {
            points.forEach((pt, i) => {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 6, 0, 2*Math.PI);
                ctx.fillStyle = ptColors[i];
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.fillText(i+1, pt.x + 10, pt.y - 10);
            });
        }

        // --- Interaction ---
        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        canvasLeft.addEventListener('mousedown', (e) => {
            if(pointsLeft.length < 3) {
                pointsLeft.push(getMousePos(canvasLeft, e));
                drawLeft();
                updateUI();
                recalculateMatrix();
            }
        });

        canvasRight.addEventListener('mousedown', (e) => {
            if(pointsRight.length < 3) {
                pointsRight.push(getMousePos(canvasRight, e));
                drawRight();
                updateUI();
                recalculateMatrix();
            }
        });

        function clearPoints() {
            pointsLeft = [];
            pointsRight = [];
            drawLeft();
            drawRight();
            updateUI();
            document.getElementById('output').innerText = "Waiting for 3 matching points...";
            document.getElementById('saveBtn').style.display = 'none';
        }

        function updateUI() {
            const ll = document.getElementById('listLeft');
            const lr = document.getElementById('listRight');
            ll.innerHTML = pointsLeft.map((p,i) => `<span style="color:${ptColors[i]}">P${i+1}: (${Math.round(p.x)}, ${Math.round(p.y)})</span>`).join('');
            lr.innerHTML = pointsRight.map((p,i) => `<span style="color:${ptColors[i]}">P${i+1}: (${Math.round(p.x)}, ${Math.round(p.y)})</span>`).join('');
        }

        // --- Math Engine (Affine Transform Solver) ---
        // Solves a system of 3 linear equations using Cramer's rule or direct inverse
        // M = [x1 y1 1; x2 y2 1; x3 y3 1]
        // [a c tx]^T = M^-1 * U
        // [b d ty]^T = M^-1 * V
        function calculateAffineMatrix(src, dst) {
            let x1 = src[0].x, y1 = src[0].y;
            let x2 = src[1].x, y2 = src[1].y;
            let x3 = src[2].x, y3 = src[2].y;
            
            let u1 = dst[0].x, v1 = dst[0].y;
            let u2 = dst[1].x, v2 = dst[1].y;
            let u3 = dst[2].x, v3 = dst[2].y;

            let detM = x1*y2 + y1*x3 + x2*y3 - y2*x3 - x1*y3 - y1*x2;
            if (Math.abs(detM) < 1e-6) {
                return null; // Points are collinear!
            }

            // M inverse
            let M_inv = [
                [(y2 - y3)/detM, (y3 - y1)/detM, (y1 - y2)/detM],
                [(x3 - x2)/detM, (x1 - x3)/detM, (x2 - x1)/detM],
                [(x2*y3 - x3*y2)/detM, (x3*y1 - x1*y3)/detM, (x1*y2 - x2*y1)/detM]
            ];

            let a = M_inv[0][0]*u1 + M_inv[0][1]*u2 + M_inv[0][2]*u3;
            let c = M_inv[1][0]*u1 + M_inv[1][1]*u2 + M_inv[1][2]*u3;
            let tx = M_inv[2][0]*u1 + M_inv[2][1]*u2 + M_inv[2][2]*u3;

            let b = M_inv[0][0]*v1 + M_inv[0][1]*v2 + M_inv[0][2]*v3;
            let d = M_inv[1][0]*v1 + M_inv[1][1]*v2 + M_inv[1][2]*v3;
            let ty = M_inv[2][0]*v1 + M_inv[2][1]*v2 + M_inv[2][2]*v3;

            return {a, b, c, d, tx, ty};
        }

        let currentMatrix = null;

        function recalculateMatrix() {
            if(pointsLeft.length === 3 && pointsRight.length === 3) {
                currentMatrix = calculateAffineMatrix(pointsLeft, pointsRight);
                if(currentMatrix) {
                    let out = `Affine Matrix Computed!\n`;
                    out += `u = (${currentMatrix.a.toFixed(4)})*x + (${currentMatrix.c.toFixed(4)})*y + (${currentMatrix.tx.toFixed(2)})\n`;
                    out += `v = (${currentMatrix.b.toFixed(4)})*x + (${currentMatrix.d.toFixed(4)})*y + (${currentMatrix.ty.toFixed(2)})\n\n`;
                    
                    // Verification test
                    let pt = pointsLeft[0];
                    let testU = currentMatrix.a*pt.x + currentMatrix.c*pt.y + currentMatrix.tx;
                    let testV = currentMatrix.b*pt.x + currentMatrix.d*pt.y + currentMatrix.ty;
                    out += `Verification P1: Src(${Math.round(pt.x)},${Math.round(pt.y)}) -> Result(${Math.round(testU)},${Math.round(testV)}) | Target(${Math.round(pointsRight[0].x)},${Math.round(pointsRight[0].y)})\n`;
                    
                    document.getElementById('output').innerText = out;
                    document.getElementById('saveBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('output').innerText = "ERROR: Points are collinear! Try choosing 3 points that form a triangle.";
                }
            }
        }

        function saveCalibration() {
            if(!currentMatrix) return;
            const data = {
                roborock_transform: roboTransform,
                affine_matrix: currentMatrix,
                reference_points: {
                    source: pointsLeft,
                    target: pointsRight
                }
            };
            
            fetch('/save_calibration', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => res.json())
            .then(data => alert('Calibration saved successfully!'))
            .catch(err => alert('Calibration computed! Currently in preview mode (server endpoint required for saving)'));
        }
    </script>
</body>
</html>
